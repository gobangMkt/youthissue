name: Weekly Issue Sync

on:
  schedule:
    - cron: '0 21 * * 0'  # 매주 일요일 21:00 UTC (한국 시간 월요일 06:00)
  workflow_dispatch:      # 수동 트리거 가능

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run fetch-and-summarize script
        run: npx tsx src/scripts/fetch-and-summarize-issues.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/data/issues.ts
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto-update weekly issues [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
